<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventorium Theme Laboratory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(90deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    padding: 20px 30px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 1.4em;
    background: linear-gradient(90deg, #00ffff, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 0.85em;
    color: rgba(255,255,255,0.6);
  }
  .controls select {
    background: rgba(255,255,255,0.08);
    color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.9em;
    cursor: pointer;
  }
  .controls select:hover { border-color: rgba(255,255,255,0.3); }
  .view-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .view-tab {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85em;
    transition: all 0.2s;
  }
  .view-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .view-tab.active { background: rgba(0,255,255,0.15); border-color: #00ffff; color: #00ffff; }

  .container { padding: 20px 30px; max-width: 1800px; margin: 0 auto; }

  /* === SWATCHES VIEW === */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .theme-column {
    border-radius: 12px;
    overflow: hidden;
  }
  .theme-column-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1em;
    font-weight: 600;
  }
  .theme-column-header .icon { font-size: 1.4em; }
  .theme-column-header .desc {
    font-size: 0.75em;
    font-weight: 400;
    opacity: 0.7;
    margin-left: auto;
  }
  .section-group {
    padding: 10px 18px 18px;
  }
  .section-title {
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 14px 0 8px;
    opacity: 0.5;
  }
  .swatch-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    font-size: 0.82em;
  }
  .swatch {
    width: 32px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .swatch-label {
    flex: 1;
    opacity: 0.7;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85em;
  }
  .swatch-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8em;
    opacity: 0.5;
  }
  .swatch-row.diff .swatch { border: 2px solid #ffaa00; box-shadow: 0 0 6px rgba(255,170,0,0.4); }
  .swatch-row.diff .swatch-label { opacity: 1; color: #ffaa00; }

  /* === UI PREVIEW VIEW === */
  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .preview-panel {
    border-radius: 12px;
    overflow: hidden;
    min-height: 600px;
  }
  .preview-topbar {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    font-size: 0.95em;
  }
  .preview-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .preview-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .preview-stat {
    padding: 12px 10px;
    border-radius: 8px;
    text-align: center;
    font-size: 0.8em;
    font-weight: 600;
  }
  .preview-stat .num { font-size: 1.6em; display: block; margin-bottom: 2px; }
  .preview-card {
    border-radius: 8px;
    padding: 14px;
    border: 1px solid transparent;
  }
  .preview-card-title { font-weight: 600; margin-bottom: 6px; }
  .preview-card-text { font-size: 0.85em; opacity: 0.8; }
  .preview-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .preview-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75em;
    border: 1px solid transparent;
  }
  .preview-status-list { display: flex; flex-direction: column; gap: 6px; }
  .preview-status-badge {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.8em;
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .preview-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .preview-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .preview-btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.82em;
    font-weight: 500;
    border: none;
    cursor: default;
  }
  .preview-input {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85em;
    border: 1px solid transparent;
    background: transparent;
    width: 100%;
  }

  /* === DIFF VIEW === */
  .diff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .diff-item {
    border-radius: 8px;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .diff-item.changed {
    border-color: rgba(255,170,0,0.4);
    background: rgba(255,170,0,0.05);
  }
  .diff-path {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.78em;
    opacity: 0.6;
    margin-bottom: 8px;
    word-break: break-all;
  }
  .diff-compare {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .diff-swatch-block {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .diff-swatch {
    width: 40px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .diff-val {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75em;
    opacity: 0.7;
    word-break: break-all;
  }
  .diff-arrow {
    font-size: 1.2em;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .diff-same { opacity: 0.3; }

  /* === GALLERY VIEW === */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 20px;
  }
  .gallery-card {
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .gallery-card:hover { transform: translateY(-3px); }
  .gallery-card-header {
    padding: 14px 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gallery-card-body { padding: 12px 16px; }
  .gallery-palette {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }
  .gallery-swatch {
    flex: 1;
    height: 32px;
    border-radius: 4px;
  }
  .gallery-desc {
    font-size: 0.8em;
    opacity: 0.7;
  }
  .gallery-stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-top: 10px;
  }
  .gallery-mini-stat {
    padding: 6px 4px;
    border-radius: 4px;
    text-align: center;
    font-size: 0.65em;
    font-weight: 600;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 0.8em;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    transition: all 0.2s;
  }
  .filter-chip:hover { background: rgba(255,255,255,0.1); }
  .filter-chip.active { background: rgba(0,255,255,0.15); border-color: #00ffff; color: #00ffff; }

  .hidden { display: none !important; }

  /* === SUGGEST VIEW === */
  .suggest-container { max-width: 650px; margin: 0 auto; }
  .suggest-field { margin-bottom: 16px; }
  .suggest-field label {
    display: block;
    font-size: 0.82em;
    color: rgba(255,255,255,0.6);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .suggest-field select,
  .suggest-field input[type="text"],
  .suggest-field textarea {
    width: 100%;
    background: rgba(255,255,255,0.08);
    color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.9em;
    font-family: inherit;
  }
  .suggest-field select:hover,
  .suggest-field input:hover,
  .suggest-field textarea:hover { border-color: rgba(255,255,255,0.3); }
  .suggest-field select:focus,
  .suggest-field input:focus,
  .suggest-field textarea:focus { outline: none; border-color: #00ffff; }
  .suggest-field textarea { resize: vertical; min-height: 60px; }
  .suggest-color-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .suggest-color-group input[type="color"] {
    width: 48px;
    height: 38px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }
  .suggest-color-group input[type="text"] { flex: 1; }
  .suggest-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px 0;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .suggest-preview-swatch {
    width: 60px;
    height: 40px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .suggest-preview-arrow { font-size: 1.4em; opacity: 0.4; }
  .suggest-preview-label { font-size: 0.78em; opacity: 0.5; text-align: center; }
  .suggest-btn {
    background: rgba(0,255,255,0.12);
    border: 1px solid rgba(0,255,255,0.4);
    color: #00ffff;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 0.9em;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    width: 100%;
  }
  .suggest-btn:hover { background: rgba(0,255,255,0.2); border-color: #00ffff; }
  .suggest-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .suggest-info {
    font-size: 0.8em;
    opacity: 0.4;
    text-align: center;
    margin-top: 14px;
  }

  /* Swatch clickability */
  .swatch-row { cursor: pointer; transition: background 0.15s; border-radius: 4px; padding: 2px 4px; margin: 2px -4px; }
  .swatch-row:hover { background: rgba(255,255,255,0.06); }
  .diff-item { cursor: pointer; transition: background 0.15s; }
  .diff-item:hover { background: rgba(255,255,255,0.06) !important; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    background: rgba(15,15,25,0.95);
    color: #e0e0e0;
    font-size: 0.9em;
    z-index: 200;
    transition: opacity 0.3s;
    backdrop-filter: blur(10px);
  }
  .toast.success { border: 1px solid #00ffff; }
  .toast.error { border: 1px solid #ff6b35; }

  @media (max-width: 900px) {
    .compare-grid, .preview-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
    .view-tabs { margin-left: 0; }
    .suggest-container { padding: 0 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Inventorium Theme Laboratory</h1>
  <div class="controls">
    <label>Left:</label>
    <select id="theme-left"></select>
    <label>Right:</label>
    <select id="theme-right"></select>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" data-view="gallery">Gallery</button>
    <button class="view-tab" data-view="swatches">Swatches</button>
    <button class="view-tab" data-view="preview">UI Preview</button>
    <button class="view-tab" data-view="diff">Diff</button>
    <button class="view-tab" data-view="suggest">Suggest</button>
  </div>
</div>

<div class="container">
  <!-- Gallery View -->
  <div id="view-gallery"></div>
  <!-- Swatches View -->
  <div id="view-swatches" class="hidden"></div>
  <!-- Preview View -->
  <div id="view-preview" class="hidden"></div>
  <!-- Diff View -->
  <div id="view-diff" class="hidden"></div>
  <!-- Suggest View -->
  <div id="view-suggest" class="hidden"></div>
</div>
<div id="toast" class="toast hidden"></div>

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
const themeKeys = Object.keys(THEMES);

function flattenColors(obj, prefix = '') {
  const result = {};
  for (const [key, val] of Object.entries(obj)) {
    const path = prefix ? `${prefix}.${key}` : key;
    if (val && typeof val === 'object' && !Array.isArray(val)) {
      Object.assign(result, flattenColors(val, path));
    } else {
      result[path] = val;
    }
  }
  return result;
}

function isColor(val) {
  if (typeof val !== 'string') return false;
  return val.startsWith('#') || val.startsWith('rgb') || val.startsWith('linear-gradient') || val.startsWith('hsl');
}

function renderSwatch(color) {
  return `<div class="swatch" style="background: ${color}"></div>`;
}

function isDark(theme) {
  const bg = theme.colors?.background?.main || '';
  return bg.includes('#0') || bg.includes('#1') || bg.includes('#2') || bg.includes('#000');
}

// ============================================================
// POPULATE SELECTS
// ============================================================
const selLeft = document.getElementById('theme-left');
const selRight = document.getElementById('theme-right');

themeKeys.forEach(k => {
  const t = THEMES[k];
  const opt1 = new Option(`${t.icon} ${t.displayName}`, k);
  const opt2 = new Option(`${t.icon} ${t.displayName}`, k);
  selLeft.add(opt1);
  selRight.add(opt2);
});
selLeft.value = 'standard';
selRight.value = 'mad-laboratory';

// ============================================================
// VIEW SWITCHING
// ============================================================
let currentView = 'gallery';
const viewTabs = document.querySelectorAll('.view-tab');
const views = { gallery: 'view-gallery', swatches: 'view-swatches', preview: 'view-preview', diff: 'view-diff', suggest: 'view-suggest' };
let suggestPrefill = { theme: '', path: '', currentValue: '' };

viewTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    viewTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    Object.values(views).forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(views[currentView]).classList.remove('hidden');
    render();
  });
});

selLeft.addEventListener('change', render);
selRight.addEventListener('change', render);

function renderGallery() {
  const el = document.getElementById('view-gallery');
  let html = '<div class="gallery-grid">';
  themeKeys.forEach(k => {
    const t = THEMES[k];
    const c = t.colors;
    const dark = isDark(t);
    const bgStyle = c.background.main;
    const textColor = dark ? '#e0e0e0' : '#333';
    html += `
      <div class="gallery-card" style="background: ${bgStyle}; border: 1px solid ${c.border.primary}; box-shadow: 0 4px 20px ${c.shadows?.medium || 'rgba(0,0,0,0.2)'};" onclick="selectTheme('${k}')">
        <div class="gallery-card-header" style="background: ${c.background.header}; color: ${dark ? '#fff' : '#333'}; border-bottom: 1px solid ${c.border.subtle};">
          <span>${t.icon}</span> ${t.displayName}
          <span style="margin-left:auto; font-size:0.7em; opacity:0.5;">v${t.version}</span>
        </div>
        <div class="gallery-card-body">
          <div class="gallery-palette">
            <div class="gallery-swatch" style="background: ${c.primary}; border-radius: 4px 0 0 4px;"></div>
            <div class="gallery-swatch" style="background: ${c.secondary}"></div>
            <div class="gallery-swatch" style="background: ${c.success}"></div>
            <div class="gallery-swatch" style="background: ${c.warning}"></div>
            <div class="gallery-swatch" style="background: ${c.error}; border-radius: 0 4px 4px 0;"></div>
          </div>
          <div class="gallery-desc" style="color: ${textColor};">${t.description}</div>
          <div class="gallery-stats-row">
            ${['total','active','completed','archived'].map(s => `
              <div class="gallery-mini-stat" style="background: ${c.dashboard.stats[s].background}; color: ${c.dashboard.stats[s].color};">
                ${s}
              </div>
            `).join('')}
          </div>
          <div style="display:flex; gap:4px; margin-top:8px;">
            ${['completed','pending','inProgress','blocked'].map(s => `
              <span style="flex:1; padding:4px; border-radius:4px; font-size:0.65em; text-align:center; background:${c.status[s].background}; border:1px solid ${c.status[s].border}; color:${c.status[s].text};">
                ${s}
              </span>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  el.innerHTML = html;
}

function selectTheme(k) {
  selRight.value = k;
  document.querySelector('[data-view="preview"]').click();
}

function renderSwatches() {
  const el = document.getElementById('view-swatches');
  const leftKey = selLeft.value;
  const rightKey = selRight.value;
  const left = THEMES[leftKey];
  const right = THEMES[rightKey];
  const leftFlat = flattenColors(left.colors);
  const rightFlat = flattenColors(right.colors);
  const allPaths = [...new Set([...Object.keys(leftFlat), ...Object.keys(rightFlat)])].sort();

  // Group by top-level section
  const sections = {};
  allPaths.forEach(p => {
    const section = p.split('.')[0];
    if (!sections[section]) sections[section] = [];
    sections[section].push(p);
  });

  function renderColumn(theme, flat, label) {
    const dark = isDark(theme);
    const bg = dark ? 'rgba(10,10,10,0.95)' : 'rgba(240,240,240,0.95)';
    const text = dark ? '#e0e0e0' : '#333';
    let html = `<div class="theme-column" style="background:${bg}; color:${text}; border:1px solid ${theme.colors.border.primary};">`;
    html += `<div class="theme-column-header" style="background:${theme.colors.background.header}; color:${dark?'#fff':'#333'}; border-bottom:1px solid ${theme.colors.border.subtle};">
      <span class="icon">${theme.icon}</span> ${theme.displayName}
      <span class="desc">${theme.description}</span>
    </div>`;
    html += '<div class="section-group">';
    for (const [section, paths] of Object.entries(sections)) {
      html += `<div class="section-title">${section}</div>`;
      paths.forEach(p => {
        const val = flat[p];
        const otherFlat = theme === left ? rightFlat : leftFlat;
        const differs = otherFlat[p] !== val;
        if (val && isColor(val)) {
          html += `<div class="swatch-row ${differs ? 'diff' : ''}" onclick="prefillSuggest('${label}','${p}','${val.replace(/'/g,"\\'")}')">
            ${renderSwatch(val)}
            <span class="swatch-label">${p.split('.').slice(1).join('.')}</span>
            <span class="swatch-value">${val.length > 40 ? val.substring(0,40)+'...' : val}</span>
          </div>`;
        }
      });
    }
    html += '</div></div>';
    return html;
  }

  el.innerHTML = `<div class="compare-grid">
    ${renderColumn(left, leftFlat, leftKey)}
    ${renderColumn(right, rightFlat, rightKey)}
  </div>`;
}

        </div>

        <!-- Selected card -->
        <div class="preview-card" style="background:${c.background.card.selected}; border-color:${c.state.selected.border}; border-width:1px; border-style:solid;">
          <div class="preview-card-title" style="color:${c.state.editing.primary};">Editing: Deploy Phase 3</div>
          <div class="preview-card-text" style="color:${c.text?.secondary || mainText};">Currently selected item with editing state active</div>
        </div>

        <!-- Status badges -->
        <div class="preview-status-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:6px;">
          ${['completed','pending','inProgress','blocked'].map(s => `
            <div class="preview-status-badge" style="background:${c.status[s].background}; border-color:${c.status[s].border}; color:${c.status[s].text};">
              <span class="preview-status-dot" style="background:${c.status[s].text};"></span>
              ${s}
            </div>
          `).join('')}
        </div>

        <!-- Buttons -->
        <div class="preview-buttons">
          <div class="preview-btn" style="background:${c.primaryButton}; color:#fff;">Primary</div>
          <div class="preview-btn" style="background:${c.dashboard.button.neutral}; color:${dark?'#fff':'#333'};">Neutral</div>
          <div class="preview-btn" style="background:${c.dashboard.button.danger}; color:#fff;">Danger</div>
          <div class="preview-btn" style="background:${c.state.disabled.background}; color:${c.state.disabled.text};">Disabled</div>
        </div>

        <!-- Input -->
        <div class="preview-input" style="background:${c.background.paper}; border-color:${c.border.subtle}; color:${c.text?.primary || mainText};">
          Type something here...
        </div>

        <!-- Activity panel -->
        <div style="background:${c.dashboard.activity.panel.background}; border:1px solid ${c.dashboard.activity.panel.border}; border-radius:8px; padding:10px;">
          <div style="font-size:0.8em; margin-bottom:6px; opacity:0.7;">Recent Activity</div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <span style="color:${c.dashboard.activity.create}; font-size:0.8em;">+ Created</span>
            <span style="color:${c.dashboard.activity.complete}; font-size:0.8em;">✓ Completed</span>
            <span style="color:${c.dashboard.activity.update}; font-size:0.8em;">↻ Updated</span>
            <span style="color:${c.dashboard.activity.delete}; font-size:0.8em;">✕ Deleted</span>
          </div>
        </div>

        <!-- Effects preview -->
        <div style="display:flex; gap:8px;">
          <div style="flex:1; padding:10px; border-radius:8px; background:${c.effects.magic.background}; border:1px solid ${c.effects.magic.primary}; text-align:center;">
            <div style="color:${c.effects.magic.primary}; font-size:0.85em;">Magic</div>
            <div style="width:20px;height:20px;border-radius:50%;margin:6px auto;background:${c.effects.magic.primary};box-shadow:0 0 12px ${c.effects.magic.glow};"></div>
          </div>
          <div style="flex:1; padding:10px; border-radius:8px; background:${c.effects.energy.background}; border:1px solid ${c.effects.energy.primary}; text-align:center;">
            <div style="color:${c.effects.energy.primary}; font-size:0.85em;">Energy</div>
            <div style="width:20px;height:20px;border-radius:50%;margin:6px auto;background:${c.effects.energy.primary};box-shadow:0 0 12px ${c.effects.energy.glow};"></div>
          </div>
        </div>

        <!-- Accent palette -->
        <div style="display:flex; gap:3px; flex-wrap:wrap;">
          ${Object.entries(c.accent).map(([name, color]) => `
            <div title="accent.${name}: ${color}" style="width:28px;height:20px;border-radius:3px;background:${color};border:1px solid rgba(128,128,128,0.3);"></div>
          `).join('')}
        </div>
      </div>
    </div>`;
  }

  el.innerHTML = `<div class="preview-grid">
    ${buildPreview(THEMES[selLeft.value])}
    ${buildPreview(THEMES[selRight.value])}
  </div>`;
}

function renderDiff() {
  const el = document.getElementById('view-diff');
  const leftKey = selLeft.value;
  const rightKey = selRight.value;
  const left = THEMES[leftKey];
  const right = THEMES[rightKey];
  const leftFlat = flattenColors(left.colors);
  const rightFlat = flattenColors(right.colors);
  const allPaths = [...new Set([...Object.keys(leftFlat), ...Object.keys(rightFlat)])].sort();

  // Filter controls
  let filterMode = 'changed'; // 'all' | 'changed' | 'same'

  function buildDiff(mode) {
    let items = allPaths.map(p => {
      const lv = leftFlat[p];
      const rv = rightFlat[p];
      const changed = lv !== rv;
      return { path: p, left: lv, right: rv, changed };
    });

    if (mode === 'changed') items = items.filter(i => i.changed);
    if (mode === 'same') items = items.filter(i => !i.changed);

    const changedCount = allPaths.filter(p => leftFlat[p] !== rightFlat[p]).length;
    const sameCount = allPaths.length - changedCount;

    let html = `<div class="filter-bar">
      <span class="filter-chip ${mode==='all'?'active':''}" data-filter="all">All (${allPaths.length})</span>
      <span class="filter-chip ${mode==='changed'?'active':''}" data-filter="changed">Changed (${changedCount})</span>
      <span class="filter-chip ${mode==='same'?'active':''}" data-filter="same">Same (${sameCount})</span>
    </div>`;

    html += '<div class="diff-grid">';
    items.forEach(item => {
      html += `<div class="diff-item ${item.changed ? 'changed' : ''}" onclick="prefillSuggest('${rightKey}','${item.path}','${(item.right||'').replace(/'/g,"\\'")}')">
        <div class="diff-path">${item.path}</div>
        <div class="diff-compare">
          <div class="diff-swatch-block">
            ${item.left && isColor(item.left) ? `<div class="diff-swatch" style="background:${item.left}"></div>` : ''}
            <div class="diff-val">${item.left ? (item.left.length > 30 ? item.left.substring(0,30)+'...' : item.left) : '<em>missing</em>'}</div>
          </div>
          <div class="diff-arrow">${item.changed ? '→' : '='}</div>
          <div class="diff-swatch-block">
            ${item.right && isColor(item.right) ? `<div class="diff-swatch" style="background:${item.right}"></div>` : ''}
            <div class="diff-val">${item.right ? (item.right.length > 30 ? item.right.substring(0,30)+'...' : item.right) : '<em>missing</em>'}</div>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
    return html;
  }

  el.innerHTML = buildDiff(filterMode);

  // Wire up filter chips
  el.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      filterMode = chip.dataset.filter;
      el.innerHTML = buildDiff(filterMode);
      // Re-wire after re-render
      el.querySelectorAll('.filter-chip').forEach(c2 => {
        c2.addEventListener('click', () => {
          filterMode = c2.dataset.filter;
          el.innerHTML = buildDiff(filterMode);
          renderDiff(); // recursive re-wire
        });
      });
    });
  });
}

// ============================================================
// SUGGEST VIEW
// ============================================================
function prefillSuggest(theme, path, currentValue) {
  suggestPrefill = { theme, path, currentValue };
  document.querySelector('[data-view="suggest"]').click();
}

function renderSuggest() {
  const el = document.getElementById('view-suggest');
  const selectedTheme = suggestPrefill.theme || themeKeys[0];
  const flat = flattenColors(THEMES[selectedTheme].colors);
  const colorPaths = Object.entries(flat).filter(([,v]) => isColor(v)).map(([k,v]) => ({ path: k, value: v }));

  el.innerHTML = `
    <div class="suggest-container">
      <h2 style="margin-bottom:4px;">Suggest a Tweak</h2>
      <p style="font-size:0.85em; opacity:0.5; margin-bottom:20px;">Pick a color, propose a change. No login needed.</p>

      <div class="suggest-field">
        <label>Theme</label>
        <select id="suggest-theme">
          ${themeKeys.map(k => `<option value="${k}" ${k===selectedTheme?'selected':''}>${THEMES[k].icon} ${THEMES[k].displayName}</option>`).join('')}
        </select>
      </div>

      <div class="suggest-field">
        <label>Color Path</label>
        <select id="suggest-path">
          ${colorPaths.map(cp => `<option value="${cp.path}" ${cp.path===suggestPrefill.path?'selected':''}>${cp.path}</option>`).join('')}
        </select>
      </div>

      <div class="suggest-preview" id="suggest-preview-area">
        <div>
          <div class="suggest-preview-swatch" id="suggest-current-swatch"></div>
          <div class="suggest-preview-label">current</div>
        </div>
        <div class="suggest-preview-arrow">&rarr;</div>
        <div>
          <div class="suggest-preview-swatch" id="suggest-new-swatch" style="background:#888;"></div>
          <div class="suggest-preview-label">proposed</div>
        </div>
      </div>

      <div class="suggest-field">
        <label>Suggested Color</label>
        <div class="suggest-color-group">
          <input type="color" id="suggest-picker" value="#00ffff">
          <input type="text" id="suggest-value" placeholder="#00ffff or rgba(...)">
        </div>
      </div>

      <div class="suggest-field">
        <label>Comment (optional)</label>
        <textarea id="suggest-comment" maxlength="500" placeholder="Why this color? What does it improve?"></textarea>
      </div>

      <button class="suggest-btn" id="suggest-submit">Submit Suggestion</button>
      <div class="suggest-info">Anonymous. No account required. Rate limited to prevent spam.</div>
    </div>
  `;

  // Wire up events
  const themeSelect = document.getElementById('suggest-theme');
  const pathSelect = document.getElementById('suggest-path');
  const picker = document.getElementById('suggest-picker');
  const valueInput = document.getElementById('suggest-value');
  const currentSwatch = document.getElementById('suggest-current-swatch');
  const newSwatch = document.getElementById('suggest-new-swatch');
  const submitBtn = document.getElementById('suggest-submit');

  function updateCurrentSwatch() {
    const t = THEMES[themeSelect.value];
    const f = flattenColors(t.colors);
    const val = f[pathSelect.value];
    currentSwatch.style.background = val || '#333';
  }

  function repopulatePaths() {
    const t = THEMES[themeSelect.value];
    const f = flattenColors(t.colors);
    const paths = Object.entries(f).filter(([,v]) => isColor(v));
    pathSelect.innerHTML = paths.map(([k]) => `<option value="${k}">${k}</option>`).join('');
    updateCurrentSwatch();
  }

  themeSelect.addEventListener('change', repopulatePaths);
  pathSelect.addEventListener('change', updateCurrentSwatch);

  picker.addEventListener('input', () => {
    valueInput.value = picker.value;
    newSwatch.style.background = picker.value;
  });

  valueInput.addEventListener('input', () => {
    newSwatch.style.background = valueInput.value || '#888';
    if (/^#[0-9a-fA-F]{6}$/.test(valueInput.value)) {
      picker.value = valueInput.value;
    }
  });

  submitBtn.addEventListener('click', async () => {
    const suggestedValue = valueInput.value.trim();
    if (!suggestedValue) { showToast('Enter a suggested color value', 'error'); return; }

    const t = THEMES[themeSelect.value];
    const f = flattenColors(t.colors);

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    try {
      const resp = await fetch('/api/theme-suggestions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          themeName: themeSelect.value,
          colorPath: pathSelect.value,
          currentValue: f[pathSelect.value] || '',
          suggestedValue,
          comment: document.getElementById('suggest-comment').value.trim()
        })
      });
      const data = await resp.json();
      if (resp.status === 201) {
        showToast(data.message || 'Suggestion received!', 'success');
        valueInput.value = '';
        document.getElementById('suggest-comment').value = '';
        newSwatch.style.background = '#888';
      } else if (resp.status === 429) {
        showToast('Too many suggestions -- wait a moment and try again', 'error');
      } else {
        showToast(data.message || 'Something went wrong', 'error');
      }
    } catch (err) {
      showToast('Network error -- is the server running?', 'error');
    }
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Suggestion';
  });

  // Apply prefill
  updateCurrentSwatch();
  if (suggestPrefill.currentValue) {
    valueInput.value = suggestPrefill.currentValue;
    newSwatch.style.background = suggestPrefill.currentValue;
    if (/^#[0-9a-fA-F]{6}$/.test(suggestPrefill.currentValue)) {
      picker.value = suggestPrefill.currentValue;
    }
  }
  // Clear prefill after use
  suggestPrefill = { theme: '', path: '', currentValue: '' };
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type}`;
  setTimeout(() => { toast.className = 'toast hidden'; }, 3500);
}

function render() {
  switch (currentView) {
    case 'gallery': renderGallery(); break;
    case 'swatches': renderSwatches(); break;
    case 'preview': renderPreview(); break;
    case 'diff': renderDiff(); break;
    case 'suggest': renderSuggest(); break;
  }
}

// Initial render
render();
</script>
